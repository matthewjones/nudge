<!doctype html>
<html lang="en-US" data-theme="dark">
 <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="A simple budgeting tool to help teens track their money and build smart spending habits.">
  <link id="theme-style" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <link rel="stylesheet" href="https://matthewjones.github.io/nudge/assets/css/nudge.css">
  <style>
  pre code,
  code {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  /* always center images */
  img {
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  figcaption {
    display: block;
    margin-left: auto;
    margin-right: auto;
  }


  /* super basic navbar */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    overflow: visible;
    font-size: 1.40rem;
  }

  nav ul {
    display: flex;
    list-style: none;
    padding: 0;
    margin: 0;
    gap: 0.5rem;
  }

</style>
  <link rel="stylesheet" href="https://matthewjones.github.io/nudge/assets/css/syntax-light.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="https://matthewjones.github.io/nudge/assets/css/syntax-dark.css" media="(prefers-color-scheme: dark)">
  <title>Budget View</title>
  <!-- <link id="theme-style" rel="stylesheet" href="https://matthewjones.github.io/nudge/assets/css/local_classless.css"> -->
 </head>
 <body>
  <header>
   <nav>
    <ul>
     <li><strong>Nudge</strong></li>
    </ul>
    <ul>
     <li><a href="https://matthewjones.github.io/nudge/">Budget</a></li>
     <li><a href="https://matthewjones.github.io/nudge/view">View</a></li>
     <li><a href="https://matthewjones.github.io/nudge/about">About</a></li>
    </ul>
   </nav>
  </header>
  <main>
   <div id="nudge-view">
    <!-- Month Navigation -->
    <div class="month-nav">
     <button id="month-prev" title="Previous month">◀</button>
     <span id="month-label" class="month-label">—</span>
     <button id="month-next" title="Next month">▶</button>
    </div>
    <!-- Report content rendered by nudge.js -->
    <div id="view-content"></div>
   </div>
  </main>
  <footer>
   <p>© 2026-26 | All Rights Reserved | Matthew Jones</p>
  </footer>
  <script src="https://matthewjones.github.io/nudge/assets/js/nudge.js"></script>
 </body>
</html>
